apiVersion: v1
kind: Service
metadata:
  name: {{ include "uifactory.name" . }}-api
  labels:
    {{- include "uifactory.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "uifactory.name" . }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}
