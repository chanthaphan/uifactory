{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "uifactory.name" . }}-kv
  labels:
    {{- include "uifactory.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.workloadIdentity.clientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ .kvName }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ .Values.keyVault.syncSecretName }}
      type: Opaque
      data:
        {{- range .Values.keyVault.secrets }}
        - objectName: {{ .kvName }}
          key: {{ .envKey }}
        {{- end }}
{{- end }}
