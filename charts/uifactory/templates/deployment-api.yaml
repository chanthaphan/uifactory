apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "uifactory.name" . }}-api
  labels:
    {{- include "uifactory.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "uifactory.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "uifactory.name" . }}
        app.kubernetes.io/component: api
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.embeddedSqlite.enabled }}
      initContainers:
        - name: db-push
          image: {{ include "uifactory.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["npx", "prisma", "db", "push", "--skip-generate", "--schema", "backend/prisma/schema.prisma"]
          env:
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          volumeMounts:
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: api
          image: {{ include "uifactory.apiImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: {{ include "uifactory.name" . }}-config
            {{- if .Values.keyVault.enabled }}
            - secretRef:
                name: {{ .Values.keyVault.syncSecretName }}
            {{- end }}
          {{- if .Values.embeddedSqlite.enabled }}
          env:
            - name: DATABASE_URL
              value: "file:/data/dev.db"
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.keyVault.enabled }}
            - name: kv
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
            {{- if .Values.embeddedSqlite.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
      volumes:
        {{- if .Values.keyVault.enabled }}
        - name: kv
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "uifactory.name" . }}-kv
        {{- end }}
        {{- if .Values.embeddedSqlite.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
