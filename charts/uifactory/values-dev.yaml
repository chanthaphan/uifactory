# Dev — quick-start demo: bundled SQLite, no Key Vault, single replica.
image:
  tag: dev

api:
  replicas: 1
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 2

embeddedSqlite:
  enabled: true
keyVault:
  enabled: false
migrations:
  enabled: false

config:
  FRONTEND_URL: https://uifactory-dev.example.com
  AZURE_AD_REDIRECT_URI: https://uifactory-dev.example.com/api/auth/callback

ingress:
  host: uifactory-dev.example.com
