server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve static assets, fall back to index.html for client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed build assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # /api/* is routed to the backend by the cluster ingress, not by nginx.
}
